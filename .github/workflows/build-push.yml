name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: dev-miguelangel

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'package.json'
              - 'package-lock.json'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'package-lock.json'
            nginx:
              - 'docker/nginx/**'

  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/portafolio-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/portafolio-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/portafolio-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/portafolio-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    name: Build Nginx image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.nginx == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Nginx
        uses: docker/build-push-action@v6
        with:
          context: ./docker/nginx
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/portafolio-nginx:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/portafolio-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-nginx]
    if: always() && (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') && (needs.build-web.result == 'success' || needs.build-web.result == 'skipped') && (needs.build-nginx.result == 'success' || needs.build-nginx.result == 'skipped') && (needs.build-api.result == 'success' || needs.build-web.result == 'success' || needs.build-nginx.result == 'success')

    steps:
      - name: Deploy via Coolify webhook
        run: |
          curl --fail -X GET \
            "https://vps.miguelangeljaimen.cl/api/v1/deploy?uuid=kqcd9c9vtcyi966q8kzjr2zn&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
