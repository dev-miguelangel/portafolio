services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: portafolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portafolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/dev-miguelangel/portafolio-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: ${DB_PASS}
      DB_NAME: portafolio
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    expose:
      - "3000"

  web:
    image: ghcr.io/dev-miguelangel/portafolio-web:latest
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  nginx:
    image: ghcr.io/dev-miguelangel/portafolio-nginx:latest
    restart: unless-stopped
    depends_on:
      - web
      - api
    expose:
      - "80"

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    expose:
      - "8978"

volumes:
  postgres_data:
  cloudbeaver_data:
