services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/dev-miguelangel/portafolio-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    expose:
      - "3000"

  web:
    image: ghcr.io/dev-miguelangel/portafolio-web:latest
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  nginx:
    image: ghcr.io/dev-miguelangel/portafolio-nginx:latest
    restart: unless-stopped
    depends_on:
      - web
      - api
    expose:
      - "80"

volumes:
  postgres_data:
